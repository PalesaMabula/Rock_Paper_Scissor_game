<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app-root">

 
  <div class="bg-loader">
    <div class="loader">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <defs>
          <mask id="clipping">
            <polygon points="0,0 100,0 100,100 0,100" fill="black"></polygon>
            <polygon points="25,25 75,25 50,75" fill="white"></polygon>
            <polygon points="50,25 75,75 25,75" fill="white"></polygon>
            <polygon points="35,35 65,35 50,65" fill="white"></polygon>
            <polygon points="35,35 65,35 50,65" fill="white"></polygon>
            <polygon points="35,35 65,35 50,65" fill="white"></polygon>
            <polygon points="35,35 65,35 50,65" fill="white"></polygon>
          </mask>
        </defs>
      </svg>
      <div class="box"></div>
    </div>
  </div>

  <div class="card">

   
    <section id="screen-start">
      <h1 class="title">ROCK PAPER SCISSORS</h1>

      <label class="field-label" for="input-name1">YOUR NAME</label>
      <input class="pixel-input" id="input-name1" type="text" maxlength="14" placeholder="PLAYER 1" />

      <p class="field-label" style="margin-top:16px;">CHOOSE OPPONENT</p>
      <div class="mode-row">
        <button class="mode-card" id="mode-computer">VS COMPUTER</button>
        <button class="mode-card" id="mode-friend">VS FRIEND</button>
      </div>

      <div id="friend-name-block" class="hidden">
        <label class="field-label" for="input-name2">FRIEND'S NAME</label>
        <input class="pixel-input" id="input-name2" type="text" maxlength="14" placeholder="PLAYER 2" />
      </div>

      <button class="btn btn-primary hidden" id="start-match-btn" style="margin-top:18px;">START MATCH</button>
    </section>

    
    <section id="screen-pass" class="hidden">
      <h2 class="title" style="font-size:16px;">PASS THE DEVICE</h2>
      <p class="hint" id="pass-copy">Player has locked in a move.</p>
      <button class="btn btn-primary" id="pass-ready-btn">I'M READY</button>
    </section>

    
    <section id="screen-game" class="hidden">
      <div class="scoreboard">
        <div class="score-block">
          <span class="score-label" id="p1-tag">YOU</span>
          <span class="score-num" id="p1-score">0</span>
        </div>
        <div class="callout" id="callout">READY</div>
        <div class="score-block">
          <span class="score-label" id="p2-tag">RIVAL</span>
          <span class="score-num" id="p2-score">0</span>
        </div>
      </div>

      <div class="arena">
        <div class="hand-wrap" id="p1-wrap"><span class="hand-emoji" id="p1-hand">✊</span></div>
        <div class="vs-badge">VS</div>
        <div class="hand-wrap" id="p2-wrap"><span class="hand-emoji" id="p2-hand">✊</span></div>
      </div>

      <p class="turn-label" id="turn-label">&nbsp;</p>
      <p class="result-line" id="result-line">Pick a move to start the round</p>

      <div class="choices">
        <button class="pick-btn" data-choice="rock">✊</button>
        <button class="pick-btn" data-choice="paper">✋</button>
        <button class="pick-btn" data-choice="scissors">✌️</button>
      </div>

      <div class="footer-row">
        <button class="btn btn-outline" id="reset-btn">RESET SCORE</button>
        <button class="btn btn-outline" id="new-players-btn">NEW PLAYERS</button>
      </div>
    </section>

  </div>
</div>
<script src="script.js"></script>
</body>
</html>
